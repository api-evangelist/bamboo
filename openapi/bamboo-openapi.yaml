  /api/order/{id}/cancel:
    post:
      tags:
        - US Stock Trading
      summary: Cancel Order
      description: >
        This endpoint is used to cancel a pending order before it executes,
        allowing users to modify their trading strategy.


        **Cancellation rules include:**

        - Pending orders can be cancelled for LIMIT and STOP orders before
        execution

        - You can only cancel market orders when market is closed because they
        usually execute too quickly to cancel during market hours

        - Executed orders cannot be cancelled once they have already filled

        - No fees are charged for order cancellation.


        Cash impact of cancellation involves reserved cash being released back
        to available buying power immediately, making funds available for other
        trades instantly.
      parameters:
        - name: content-type
          in: header
          description: Acceptable content type
          example: application/json
          required: true
          schema:
            type: string
