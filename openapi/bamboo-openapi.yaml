components:
  schemas:
    bamboowebhook:
      title: Deposit request for Banking Institutions
      required:
        - amount_paid
        - currency
        - provider
        - reference
        - phone_number
        - transaction_date
      type: object
      properties:
        amount_paid:
          type: number
          description: Amount to be deposited
          example: 5000
        currency:
          type: string
          description: Currency
          example: NGN
        provider:
          type: string
          description: API Consumer Name
          example: invest-bamboo
        reference:
          type: string
          description: Deposit reference
          example: INVcal2VzeVGJkCXNx
        phone_number:
          type: string
          description: User phone number
          example: '+2348036477166'
        transaction_date:
          type: string
          description: Date of creating the transaction
          example: '2022-02-02'
        market:
          type: string
          description: >-
            Either "US" or "NGX". It's used to specify desired stock market. If
            no market is specified, it defaults to US.
          example: US
    DepositRequest:
      title: Deposit request for non-banking institutions
      required:
        - payment_method_id
        - deposit_type
        - amount
        - destination_wallet_id
      type: object
      properties:
        predefined_plan_id:
          type: number
          description: predefined Plan ID
          default: 1
        payment_method_id:
          type: integer
          description: Payment method ID
          default: 1
        deposit_type:
          type: string
          description: Deposit type
          default: Instant
        amount:
          type: number
          description: Amount to pay
          default: 2000
        destination_wallet_id:
          type: number
          description: wallet ID
          default: 1
    DepositResponse:
      title: Deposit Details
      required:
        - txref
        - transfer_note
        - transfer_bank
        - transfer_account
        - transfer_amount
        - mode
        - currency
        - account_expiration
      type: object
      properties:
        txref:
          type: string
          description: Txref of deposit
          example: f308cd36-a91a-4ee6-a380-49c096d6b0e1-1696686649
        transfer_note:
          type: string
          description: Note
          example: null
        transfer_bank:
          type: string
          description: Transfer Bank
          example: Mock Bank
        transfer_amount:
          type: string
          description: Ammount
          example: 1738000
        transfer_account:
          type: string
          description: Transfer Account
          example: '0067100155'
        mode:
          type: string
          description: Mode of payment
          example: null
        currency:
          type: string
          description: Currency
          example: NGN
        account_expiration:
          type: string
          description: Account expiration
          example: null
    Unauthorized:
      title: Unauthorized response
      required:
        - message
      type: object
      properties:
        message:
          type: string
          description: Unauthorized/Invalid Token/Token has expired
          example: Invalid client token supplied.
      description: Token is invalid or have expired
    ErrorChangesetResponse:
      title: Error changeset response
      required:
        - errors
        - message
      type: object
      properties:
        message:
          type: string
          description: Message why request didn't succeed
          example: Invalid credentials
        errors:
          type: object
          properties: {}
          description: Map of errors
      description: Error response for request which manipulates data
    TenantDepositsPaginationResponse:
      title: List of all deposits with pagination
      type: object
      properties:
        next_token:
          type: integer
          description: Next token for pagination
          example: 10
        deposits:
          type: array
          description: Deposit response
          items:
            title: Deposit response
            type: object
            properties:
              user_surname:
                type: string
                description: User surname
                example: Doe
              user_name:
                type: string
                description: User name
                example: John
              transaction_id:
                type: string
                description: transaction id for the deposit
                example: INVcal2V2eVGJkCXNx
              status:
                type: string
                description: Deposit status
                example: pending
              phone_number:
                type: string
                description: User's phone number
                example: '+2348033741268'
              id:
                type: integer
                description: Deposit id
                example: 5804
              email:
                type: string
                description: User email
                example: johndoe@gmail.com
              created_at:
                type: integer
                description: Creation date in unix timestamp UTC
                example: '1759689482'
              api_consumer_name:
                type: string
                description: api consumer name
                example: invest-bamboo
              amount:
                type: string
                description: amount
                example: 5000
            description: Deposit parameters
      description: List of deposits and next_token
    DepositStatus:
      title: Status of a Deposit
      type: object
      description: Deposit status
      properties:
        amount:
          type: integer
          description: amount
          example: 100.02
        currency:
          type: string
          description: currency
          example: USD
        status:
          type: string
          description: status
          example: Settlemented
        txref:
          type: string
          description: status
          example: BIO63894410548a7f170d8159978UIO
    TenantWithdrawsPaginationResponse:
      title: List of all withdrawals with pagination
      type: object
      properties:
        next_token:
          type: integer
          description: Next token for pagination
          example: 10
        withdrawals:
          type: array
          description: Withdrawal response
          items:
            title: Deposit response
            type: object
            properties:
              user_surname:
                type: string
                description: User surname
                example: Doe
              user_phone:
                type: string
                description: User's phone number
                example: '+2348033741268'
              user_name:
                type: string
                description: User name
                example: John
              user_indentifier:
                type: string
                description: User indentifier (BVN or NIN)
                example: 22388291636
              user_email:
                type: string
                description: User email
                example: johndoe@gmail.com
              swift_aba_code:
                type: string
                description: Swift or aba code - only if currency is USD
              status:
                type: string
                description: Deposit status
                example: pending
              reference:
                type: string
                description: reference
                example: INVKPxiJVc40BNaQBH
              intermediary_bank_swift_code:
                type: string
                description: bank code
              intermediary_bank:
                type: string
                description: Intermediary bank - only if currency is USD
              id:
                type: integer
                description: Deposit id
                example: 5804
              fees:
                type: string
                description: Fees information
              exchange_rate:
                type: string
                description: Exchange rate
              dollar_fees:
                type: string
                description: Fees information in dollar
              dollar_amount:
                type: integer
                description: amount
                example: 130
              currency:
                type: string
                description: currency
              created_at:
                type: integer
                description: Creation date in unix timestamp UTC
                example: 2022-02-02 01:10:20 UTC
              beneficiary_name:
                type: string
                description: Beneficiary name - only if currency is USD
              bank_zip_code:
                type: string
                description: Bank zip code - only if currency is USD
              bank_state:
                type: string
                description: Bank state - only if currency is USD
              bank_name:
                type: string
                description: Bank name - only if currency is USD
              bank_country:
                type: string
                description: Bank country - only if currency is USD
              bank_address:
                type: string
                description: Bank address - only if currency is USD
              amount:
                type: integer
                description: amount
                example: 13400
              additional_instructions:
                type: string
                description: Additional instructuons - only if currency is USD
              account_number:
                type: string
                description: account number
                example: 23768954
            description: Deposit parameters
      description: List of deposits and next_token
    ResourceNotFound:
      title: Resource not found
      required:
        - message
      type: object
      properties:
        message:
          type: string
          description: Resource not found (an incorrect url may have been used)
          example: Resource Not Found
      description: Error response for when the resource is not found within our data.
    ErrorResponse:
      title: Error response
      required:
        - message
      type: object
      properties:
        message:
          type: string
          description: Error response for external or internal errors not connected to data
          example: Message why request didn't succeed
      description: Error response for external or internal errors not connected to data
    ThemesListingResponse:
      title: List of all themes
      type: object
      properties:
        themes:
          type: array
          description: Themes listing response
          items:
            title: Themes listing response
            type: object
            properties:
              name:
                type: string
                description: Theme name
                example: Most Popularr
              id:
                type: number
                description: Theme ID
                example: 45
              hex_color:
                type: string
                description: Theme hex_color
                example: D5F59A
              description:
                type: string
                description: Theme description
                example: The most-owned stocks in the Bamboo community.
              color:
                type: string
                description: Theme color
                example: Blue
              avatar:
                type: string
                description: Theme avatar
                example: >-
                  https://firebasestorage.googleapis.com/v0/b/bamboo-16d59.appspot.com/o/staging%2Fcategories%2FMost%20Popular.png1605885112566?alt=media&token=7300dc44-f067-4aec-a3a6-6e0498de775d
            description: Theme basic response details
        currency_symbol:
          type: string
          description: Theme currency symbol
          example: $
      description: List of all active stocks
    TenantBrokerageWithdrawBody:
      title: Tenant Brokerage Request body for NGN
      required:
        - reference
        - amount
        - currency
      type: object
      properties:
        currency:
          type: string
          description: currency
          example: NGN
        amount:
          type: integer
          description: amount
          example: 13400
        reference:
          type: string
          description: reference
          example: INVKPxiJVc40BNaQBH
        market:
          type: string
          description: >-
            Either "US" or "NGX". It is used to specify desired stock market. If
