  /api/order/calculate:
    post:
      tags:
        - US Stock Trading
      summary: Calculate Order
      description: >
        This endpoint estimates the exact order cost, fees, and trade
        feasibility for the specified order type before execution.  


        It supports **Market**, **Limit**, and **Stop** order types and
        determines the precise values that should be used when placing an actual
        order.


        The values returned guide what to send in the `/api/order` request.


        **Integration Flow:**

        - First, call this endpoint to calculate the order.

        - Then, use the `order_price` from the calculation response as the
        `total_price` when placing the order.

        - All other response fields (e.g., `price_per_share`, `quantity`, `fee`)
        must be reused exactly as returned.


        **Developer Note:**  

        - Multiple example payloads are available below. Please **switch to the
        relevant example (Market, Limit, or Stop)** before copying and testing
        your request.

        - Recall that **Limit/Stop orders** are *Good Till Canceled (GTC)* or
        the set `expiration_date` (default of 90 days applies if no expiration
        is set).
      operationId: Web.Api.OrderController.calculate_market_order
      parameters:
        - name: content-type
          in: header
          description: Advertises which content type is acceptable.
          example: application/json
          required: true
          schema:
            type: string
        - name: accept-language
          in: header
          description: >-
            Advertises which languages the tenant is able to understand. For
            example, 'en' for English Language.
