  /bamboo/webhook:
    post:
      tags:
        - Deposits
      summary: Create Deposit
      description: >
        To make a deposit, you send a notification request with the necessary
        details to credit the user's brokerage account. Upon receiving the
        request, a record is created in our system and verification checks are
        performed to confirm the deposit source.


        Verification is carried out using an endpoint you provide to our
        integration team during account setup. Once the deposit is verified, the
        specified amount is credited to the user's brokerage account, and
        deposit status events are sent via Google Pub/Sub. (see details under
        [events section](#section/Deposit-Event))


        ### Verification Endpoint Requirements:

        - **Request Type:** GET

        - **URL Pattern:** THE_URL/deposit/status/YOUR_UNIQUE_REFERENCE

        - **Authentication:** Static hash in headers (share this hash with
        Bamboo along with your verification URL)


        #### Example JSON Webhook Response:
            {
              "data": {
                "status": "settled", // or "failed"
                "currency": "NGN",
                "amount": 30000.00
              },
              "status": "settled" // or "failed"  
            }
        **NB:** You can also  monitor all deposit activity through the <a
        href="http://pbb.investbamboo.com/"> PBB Dashboard</a>.
      operationId: Web.Api.TransactionController.webhook
      parameters:
        - name: content-type
          in: header
          description: Acceptable content type
          example: application/json
          required: true
          schema:
            type: string
        - name: accept-language
          in: header
          description: Acceptable language; 'en' for English
          example: en
          required: true
          schema:
            type: string
        - name: x-user-id
          in: header
          description: Required for user authentication
          required: true
          schema:
            type: string
        - name: x-subject-type
          in: header
          description: For user request -> 'tenant'.
          required: true
          schema:
            type: string
        - name: x-client-token
          in: header
          description: API Consumer Authorisation Token
          required: true
          schema:
            type: string
        - name: x-request-source
          in: header
          description: The tenant's username
          required: true
          schema:
            type: string
      requestBody:
        description: Deposit request
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/bamboowebhook'
        required: true
      responses:
        '200':
          description: 200 OK
          content:
            application/json:
              schema:
                type: string
                description: No response body for this endpoint
                example: ''
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                title: Bad request
                required:
                  - message
                type: object
                properties:
                  message:
                    type: string
                    description: Bad request
                    example: Bad request
                description: Bad request
        '422':
          description: Incomplete Parameters
          content:
            application/json:
              example:
                message: Error Message
              schema:
                $ref: '#/components/schemas/ErrorChangesetResponse'
