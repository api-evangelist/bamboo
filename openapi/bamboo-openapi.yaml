paths:
  /oauth/token:
    post:
      tags:
        - Authentication
      summary: Generate Access Token
      description: >
        This endpoint generates your access token, referred to as your
        `x-client-token` within Bamboo’s system. 

        The credentials needed to generate it will be provided by the Bamboo
        Team during account setup. 
      operationId: Web.Api.AuthController.oauth
      parameters:
        - name: content-type
          in: header
          description: Acceptable content type
          required: true
          schema:
            type: string
            default: application/json
        - name: accept-language
          in: header
          description: Acceptable language; 'en' for English
          required: true
          schema:
            type: string
            default: en
        - name: app-key
          in: header
          description: >-
            Application key that uniquely identifies a tenant as an API
            consumer.
          example: 1755d3dd-e6b9-4df1-9537-eb9017da70g9
          required: true
          schema:
            type: string
      requestBody:
        description: Tenant Level Authentication Request
        content:
          application/json:
            schema:
              title: Tenant login request
              required:
                - username
                - password
              type: object
              properties:
                username:
                  type: string
                  description: Username
                  example: invest-bamboo
                password:
                  type: string
                  description: Password
                  example: >-
                    32qC6I2U5J-0i73zJDEdapFJvwICJAl1I7ScekqupVfouiAMz_J7obWHI3kuDVOL
              description: POST request body parameters
      responses:
        '200':
          description: Tenant Login Successful
          content:
            application/json:
              schema:
                title: Response
                required:
                  - access_token
                  - expires_in
                type: object
                properties:
                  access_token:
                    type: string
                    required:
